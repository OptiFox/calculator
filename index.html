<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project: Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Calculator</h1>

    <div class="container">
      <div class="display">
        <div class="num-one"></div>
        <div class="operator"></div>
        <div class="num-two"></div>
      </div>

      <div class="keys">
        <div class="number-container">
          <div class="numbers">
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>3</button>
            <button>2</button>
            <button>1</button>
            
            <button><</button>
            <button>0</button>
            <button>.</button>
          </div>
          <button class="clear">C</button>
        </div>

        <div class="operator-container">
          <div class="operators">
            <button>/</button>
            <button>*</button>
            <button>-</button>
            <button>+</button>
          </div>
          <button class="btn-operate">=</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
